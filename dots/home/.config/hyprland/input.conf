# Managed by Decman
# Ported from NixOS Hyprland input settings.

input {
    kb_layout = us,ru-custom
    kb_options = grp:ctrl_shift_toggle

    repeat_rate = 50
    repeat_delay = 300

    follow_mouse = 1
    focus_on_close = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}
