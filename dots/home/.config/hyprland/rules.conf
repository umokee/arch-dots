# Managed by Decman
# Ported from nixos/modules/home-manager/desktop/hyprland/rules.nix

# Floating windows
windowrule = float on, match:class ^(guifetch|yad|zenity|wev|feh|imv|system-config-printer|org.quickshell)$
windowrule = float on, match:class ^(org.gnome.FileRoller|file-roller|blueman-manager)$
windowrule = float on, match:class ^(com.github.GradienceTeam.Gradience)$

# Foot + nmtui
windowrule = float on, match:class foot, match:title nmtui
windowrule = size 60% 70%, match:class foot, match:title nmtui
windowrule = center on, match:class foot, match:title nmtui

# GNOME Settings
windowrule = float on, match:class ^(org.gnome.Settings)$
windowrule = size 70% 80%, match:class ^(org.gnome.Settings)$
windowrule = center on, match:class ^(org.gnome.Settings)$

# Pavucontrol & yad-icon-browser
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol|yad-icon-browser)$
windowrule = size 60% 70%, match:class ^(org.pulseaudio.pavucontrol|yad-icon-browser)$
windowrule = center on, match:class ^(org.pulseaudio.pavucontrol|yad-icon-browser)$

# nwg-look
windowrule = float on, match:class ^(nwg-look)$
windowrule = size 50% 60%, match:class ^(nwg-look)$
windowrule = center on, match:class ^(nwg-look)$

# ATLauncher Console
windowrule = float on, match:class ^(com-atlauncher-App)$, match:title ^(ATLauncher Console)$

# File dialogs
windowrule = float on, match:title ^(Select|Open)( a)? (File|Folder)(s)?$
windowrule = float on, match:title ^File (Operation|Upload)( Progress)?$
windowrule = float on, match:title ^(.* Properties|Export Image as PNG|GIMP Crash Debug|Save As|Library)$

# Picture-in-Picture
windowrule = float on, match:title ^Picture(-| )in(-| )[Pp]icture$
windowrule = pin on, match:title ^Picture(-| )in(-| )[Pp]icture$
windowrule = keep_aspect_ratio on, match:title ^Picture(-| )in(-| )[Pp]icture$
windowrule = move 100%-w-2% 100%-w-3%, match:title ^Picture(-| )in(-| )[Pp]icture$

# Steam
windowrule = rounding 10, match:class ^steam$, match:title ^$
windowrule = float on, match:class ^steam$, match:title ^Friends List$

# Steam games
windowrule = workspace 5 silent, match:class ^steam_app_
windowrule = immediate on, match:class ^steam_app_
windowrule = idle_inhibit always, match:class ^steam_app_

# Windows .exe / Wine / Proton
windowrule = workspace 5 silent, match:class \.exe$
windowrule = immediate on, match:class \.exe$

# Fusion360
windowrule = no_blur on, match:class ^fusion360\.exe$, match:title ^(Fusion360|Marking Menu)$

# Opaque windows
windowrule = opaque on, match:class ^(foot|equibop|org.quickshell|imv|swappy)$

# XWayland windows
windowrule = no_dim on, match:xwayland true, match:title ^win[0-9]+$
windowrule = no_shadow on, match:xwayland true, match:title ^win[0-9]+$
windowrule = rounding 10, match:xwayland true, match:title ^win[0-9]+$

# Fullscreen opacity
windowrule = opacity 1 override, match:fullscreen false

# Center floating native Wayland windows
windowrule = center on, match:float true, match:xwayland false

# Workspace assignments
windowrule = workspace 1, match:class ^(firefox|zen-beta|google-chrome|chromium|brave-browser)$
windowrule = workspace 2, match:class ^(code|vscodium|jetbrains-idea|jetbrains-clion|neovide)$
windowrule = workspace 5 silent, match:class ^(steam|lutris|heroic|com.usebottles.bottles|gamescope)$
windowrule = workspace 6, match:class ^nemo$
windowrule = workspace 7, match:class ^foot$
windowrule = workspace 9, match:class ^(yandex-music|spotify)$
windowrule = workspace 10, match:class ^(org\.telegram\.desktop|discord|vesktop|element-desktop)$

# JetBrains fix
windowrule = no_initial_focus on, match:class ^(.*jetbrains.*)$, match:title ^(win.*)$
