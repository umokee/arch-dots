set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",foot:RGB"

set -g default-shell /usr/bin/fish
set -g default-command /usr/bin/fish

set -g mouse on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

unbind '"'
unbind %

# New window/current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind -r C-h previous-window
bind -r C-l next-window

# Copy mode
setw -g mode-keys vi
bind [ copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Clipboard integration
set -g set-clipboard on

# Status
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=#090B17,fg=#c0caf5"
set -g status-left-length 60
set -g status-right-length 120

set -g status-left "#[fg=#7aa2f7,bold] #S #[fg=#565f89]| "
set -g status-right "#[fg=#565f89]%Y-%m-%d #[fg=#7dcfff]%H:%M "

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#090B17,bg=#7aa2f7,bold] #I:#W "

set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

set -g message-style "bg=#292e42,fg=#c0caf5"
set -g mode-style "bg=#292e42,fg=#c0caf5"
