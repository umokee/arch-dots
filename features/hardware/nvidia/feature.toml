id = "hardware.nvidia"
description = "Migrated feature hardware.nvidia"

[packages]
pacman = [
  "nvidia-utils",
  "nvidia-settings",
  "libva-nvidia-driver",
  "lib32-nvidia-utils",
]
aur = []

[[dirs]]
target = "/etc/modprobe.d"
permissions = "755"

[[dirs]]
target = "/etc/environment.d"
permissions = "755"

[[files]]
source = "templates/nvidia-modprobe.j2"
target = "/etc/modprobe.d/nvidia.conf"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[files]]
source = "templates/nvidia-env.j2"
target = "/etc/environment.d/30-nvidia.conf"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"
