id = "programs.apps"
description = "Migrated feature programs.apps"

[packages]
pacman = [
  "obsidian",
  "telegram-desktop",
  "libreoffice-fresh",
  "xorg-xlsclients",
  "transmission-gtk",
  "wev",
  "obs-studio",
  "webkit2gtk-4.1",
  "pavucontrol",
  "easyeffects",
  "simple-scan",
  "sane",
  "virt-manager",
  "network-manager-applet",
]
aur = [
  "throne-bin",
  "winboat-bin",
  "spotify",
  "czkawka-gui",
  "mullvad-browser-bin",
  "pgadmin4-bin",
  "openai-codex-bin",
  "vesktop-bin",
]

[[dirs]]
target = "~/.local/share/applications"
permissions = "755"

[[files]]
source = "templates/vesktop-proxy.desktop.j2"
target = "~/.local/share/applications/vesktop-proxy.desktop"
mode = "template"
type = "file"
permissions = "644"
