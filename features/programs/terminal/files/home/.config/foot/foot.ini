[main]
term=xterm-256color

font=JetBrainsMono Nerd Font:size=11
font-bold=JetBrainsMono Nerd Font:style=Bold:size=11
font-italic=JetBrainsMono Nerd Font:style=Italic:size=11
font-bold-italic=JetBrainsMono Nerd Font:style=Bold Italic:size=11

dpi-aware=yes
pad=15x15 center
selection-target=clipboard
shell=fish
initial-color-theme=dark

[bell]
urgent=no
notify=no
visual=no

[scrollback]
lines=10000
multiplier=3.0

[url]
launch=xdg-open ${url}

[cursor]
style=block
blink=no
unfocused-style=hollow

[mouse]
hide-when-typing=yes

[colors-dark]
alpha=0.95

foreground=c0caf5
background=090b17

selection-foreground=c0caf5
selection-background=292e42

regular0=090b17
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=c0caf5

bright0=565f89
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert
search-start=Control+Shift+r
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0

[mouse-bindings]
select-extend=none
clipboard-paste=BTN_RIGHT

select-begin=BTN_LEFT
select-begin-block=Control+BTN_LEFT
select-word=BTN_LEFT-2
select-quote=BTN_LEFT-3
select-row=BTN_LEFT-4

primary-paste=BTN_MIDDLE
