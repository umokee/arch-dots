add_newline = true
scan_timeout = 50
command_timeout = 800
follow_symlinks = false

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$sudo\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[directory]
style = "bold fg:#d8dee9"
read_only = " ´Çú"
read_only_style = "fg:#d8dee9"
truncation_length = 4
truncate_to_repo = false
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "´Éÿ "
style = "fg:#9ca3af"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:#d8dee9"
format = "[$all_status$ahead_behind]($style)"
conflicted = "Ôëá${count} "
ahead = "Ôåæ${count} "
behind = "Ôåô${count} "
diverged = "Ôåò${ahead_count}/${behind_count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "~${count} "
staged = "+${count} "
renamed = "┬╗${count} "
deleted = "-${count} "

[python]
symbol = "¯ÿå "
style = "fg:#9ca3af"
format = "[$symbol$version]($style) "
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]
detect_folders = [".venv"]

[nodejs]
symbol = "¯£ÿ "
style = "fg:#9ca3af"
format = "[$symbol$version]($style) "
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx"]
detect_files = ["package.json", ".node-version", ".nvmrc"]

[rust]
symbol = "¯×¿ "
style = "fg:#9ca3af"
format = "[$symbol$version]($style) "

[golang]
symbol = "¯ÿº "
style = "fg:#9ca3af"
format = "[$symbol$version]($style) "

[sudo]
disabled = false
symbol = "´Çú "
style = "bold fg:#d8dee9"
format = "[$symbol]($style)"

[cmd_duration]
min_time = 1500
style = "fg:#6b7280"
format = "[$duration]($style) "

[character]
success_symbol = "[ÔØ»](bold fg:#d8dee9)"
error_symbol = "[ÔØ»](bold fg:#d8dee9)"
vimcmd_symbol = "[ÔØ«](fg:#9ca3af)"
vimcmd_replace_one_symbol = "[ÔØ«](fg:#9ca3af)"
vimcmd_replace_symbol = "[ÔØ«](fg:#9ca3af)"
vimcmd_visual_symbol = "[ÔØ«](fg:#d8dee9)"
