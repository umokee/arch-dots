id = "services.xray"
description = "Xray-core server with VLESS REALITY config"

[[dirs]]
target = "/usr/local/etc/xray"
permissions = "755"

[[dirs]]
target = "/etc/systemd/system/xray.service.d"
permissions = "755"

[[dirs]]
target = "/etc/logrotate.d"
permissions = "755"

[[files]]
source = "templates/config.json.j2"
target = "/usr/local/etc/xray/config.json"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "600"

[[files]]
source = "templates/systemd-override.conf.j2"
target = "/etc/systemd/system/xray.service.d/override.conf"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[files]]
source = "templates/logrotate-xray.j2"
target = "/etc/logrotate.d/xray"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[hooks]]
name = "install-xray"
script = "install-xray.sh"
run = "pre"
kind = "sync"
note = "Installs or updates Xray using official XTLS installer."

[[hooks]]
name = "restart-xray"
script = "restart-xray.sh"
run = "post"
kind = "generator"
note = "Reloads systemd and restarts Xray."

[[systemd.system]]
unit = "xray.service"
enable = true
start = true
