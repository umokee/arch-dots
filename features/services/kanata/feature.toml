id = "services.kanata"
description = "Migrated feature services.kanata"

[packages]
pacman = []
aur = ["kanata"]

[[dirs]]
target = "/etc/kanata"
permissions = "755"

[[dirs]]
target = "/etc/systemd/system"
permissions = "755"

[[files]]
source = "templates/kanata-config.j2"
target = "/etc/kanata/config.kbd"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[files]]
source = "templates/kanata-service.j2"
target = "/etc/systemd/system/kanata.service"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[systemd.system]]
unit = "kanata.service"
enable = true
start = true
