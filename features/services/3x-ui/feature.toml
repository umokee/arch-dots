id = "services.3x-ui"
description = "Native 3x-ui panel for managing Xray server"

[[dirs]]
target = "/etc/archctl"
permissions = "755"

[[dirs]]
target = "/etc/x-ui"
permissions = "755"

[[dirs]]
target = "/root/cert"
permissions = "755"

[[dirs]]
target = "/opt/3x-ui/backups"
permissions = "755"

[[dirs]]
target = "/usr/local/bin"
permissions = "755"

[[files]]
source = "templates/3x-ui.env.j2"
target = "/etc/archctl/3x-ui.env"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "600"

[[files]]
source = "templates/backup-3x-ui.sh.j2"
target = "/usr/local/bin/backup-3x-ui"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "755"

[[files]]
source = "templates/backup-3x-ui.service.j2"
target = "/etc/systemd/system/backup-3x-ui.service"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[files]]
source = "templates/backup-3x-ui.timer.j2"
target = "/etc/systemd/system/backup-3x-ui.timer"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[hooks]]
name = "install-native-3x-ui"
script = "install-native-3x-ui.sh"
run = "post"
kind = "sync"
note = "Installs native 3x-ui, removes old Docker container, locks panel to 127.0.0.1."

[[systemd.system]]
unit = "backup-3x-ui.timer"
enable = true
start = true
