id = "services.3x-ui"
description = "Native 3x-ui panel for managing Xray server"

[[dirs]]
target = "/etc/x-ui"
permissions = "755"

[[dirs]]
target = "/root/cert"
permissions = "755"

[[dirs]]
target = "/opt/3x-ui/backups"
permissions = "755"

[[dirs]]
target = "/usr/local/bin"
permissions = "755"

[[files]]
source = "templates/backup-3x-ui.sh.j2"
target = "/usr/local/bin/backup-3x-ui"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "755"

[[files]]
source = "templates/backup-3x-ui.service.j2"
target = "/etc/systemd/system/backup-3x-ui.service"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[files]]
source = "templates/backup-3x-ui.timer.j2"
target = "/etc/systemd/system/backup-3x-ui.timer"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[hooks]]
name = "install-native-3x-ui"
script = "install-native-3x-ui.sh"
run = "pre"
kind = "sync"
note = "Installs native 3x-ui using official installer."

[[hooks]]
name = "restart-3x-ui"
script = "restart-3x-ui.sh"
run = "post"
kind = "generator"
note = "Reloads systemd and starts native x-ui."

[[systemd.system]]
unit = "x-ui.service"
enable = true
start = true

[[systemd.system]]
unit = "backup-3x-ui.timer"
enable = true
start = true
