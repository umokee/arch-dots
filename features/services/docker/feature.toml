id = "services.docker"
description = "Docker Engine for WinBoat and local containers"

[packages]
pacman = [
  "docker",
  "docker-compose",
  "docker-buildx",
  "runc",
]
aur = []

[[dirs]]
target = "/etc/docker"
permissions = "755"

[[files]]
source = "templates/daemon.json.j2"
target = "/etc/docker/daemon.json"
mode = "template"
type = "file"
owner = "root"
group = "root"
permissions = "644"

[[systemd.system]]
unit = "docker.service"
enable = true
start = true

[[hooks]]
name = "docker-user-groups"
script = "docker-user-groups.sh"
run = "post"
kind = "external-state"
note = "Adds the user to docker/kvm groups. archctl will not remove the user from groups automatically."
