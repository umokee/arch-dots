id = "workspace.kanshi"
description = "Migrated feature workspace.kanshi"

[packages]
pacman = ["kanshi"]
aur = []

[[dirs]]
target = "~/.config/kanshi"
permissions = "755"

[[dirs]]
target = "~/.config/systemd/user"
permissions = "755"

[[files]]
source = "templates/kanshi-config.j2"
target = "~/.config/kanshi/config"
mode = "template"
type = "file"
permissions = "644"

[[files]]
source = "templates/kanshi-service.j2"
target = "~/.config/systemd/user/kanshi.service"
mode = "template"
type = "file"
permissions = "644"

[[systemd.user]]
unit = "kanshi.service"
enable = true
start = true
